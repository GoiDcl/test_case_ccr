x-app_environment: &app_environment
  environment:
    - DEBUG
    - ALLOWED_HOSTS
    - SECRET_KEY
    - ENABLE_API
    - POSTGRES_NAME
    - POSTGRES_USER
    - POSTGRES_HOST
    - POSTGRES_PORT
    - POSTGRES_PASSWORD
    - CELERY_BROKER_URL

services:
  backend:
    image: python:3.12-slim
    build:
      context: ./backend
    <<: *app_environment
    entrypoint: sh wait-for db:5432 -- ./entrypoint.sh
    depends_on:
      - db
      - redis

  db:
    image: postgres:17-alpine
    volumes:
      - postgresdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD
      - POSTGRES_HOST_AUTH_METHOD

  redis:
    image: redis:8.0-alpine
    volumes:
      - redisdata:/data

  celery:
    image: python:3.12-slim
    build:
      context: ./backend
    command: celery -A config.celery worker -l info -c 1 -n celery@worker.main -Q celery
    depends_on:
      - db
      - redis
    <<: *app_environment

  celery_beat:
    image: python:3.12-slim
    build:
      context: ./backend
    command: celery -A config beat -l info --pidfile=/tmp/celeryd.pid
    depends_on:
      - db
      - redis
    <<: *app_environment

volumes:
  static:
  redisdata:
  postgresdata: