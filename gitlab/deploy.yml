.before_script_docker_login: &before_script_docker_login
  echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin $CI_REGISTRY

.before_script_configure_ssh: &before_script_configure_ssh |
  set -x
  # Проверка обязательных переменных
  if [ -z "$DEPLOY_HOST" ]; then
    echo "ERROR: DEPLOY_HOST не установлена!"
    exit 1
  fi
  if [ -z "$DEPLOY_USER" ]; then
    echo "ERROR: DEPLOY_USER не установлена!"
    exit 1
  fi
  if [ -z "$SSH_PRIVATE_KEY" ]; then
    echo "ERROR: SSH_PRIVATE_KEY не установлена!"
    exit 1
  fi
  echo "✓ Переменные окружения проверены"
  echo "  DEPLOY_HOST: $DEPLOY_HOST"
  echo "  DEPLOY_USER: $DEPLOY_USER"
  which ssh-agent || ( apk --update add openssh-client )
  eval $(ssh-agent -s)
  echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add - > /dev/null
  echo "→ Создание ~/.ssh директории"
  mkdir -p ~/.ssh
  chmod 700 ~/.ssh
  echo "→ SSH keyscan для $DEPLOY_HOST"
  ssh-keyscan "$DEPLOY_HOST" >> ~/.ssh/known_hosts
  chmod 644 ~/.ssh/known_hosts
  echo "→ Настройка SSH конфига"
  [[ -f /.dockerenv ]] && echo -e "Host *\n\tStrictHostKeyChecking no\n\n" > ~/.ssh/config
  echo "✓ SSH настроен"
  set +x

.base-deploy-swarm:
  stage: deploy
  variables:
    DOCKER_HOST: ssh://$DEPLOY_USER@$DEPLOY_HOST
  before_script:
    - *before_script_configure_ssh
    - *before_script_docker_login
  script:
    - TAG=${CI_COMMIT_REF_SLUG} docker stack deploy --compose-file docker-compose.production.yml --with-registry-auth --resolve-image=always test_app
    - sleep 90

.rollback-swarm-template: &rollback-swarm-template
  extends: .base-deploy-swarm
  variables:
    SERVICES: ""
    WAIT_SECONDS: "5"
  script:
    - |
      for svc in $SERVICES; do
        [ -z "$svc" ] && continue
        echo "Rolling back $svc"
        if docker service rollback "$svc"; then
          docker service ps "$svc" --no-trunc
          docker service inspect --format '{{json .UpdateStatus}}' "$svc" || true
        else
          echo "rollback failed for $svc"
        fi
        sleep "$WAIT_SECONDS"
      done
  rules:
    - if: '$SECURITY_SCHEDULE == "true"'
      when: never
    - if: '$CI_COMMIT_BRANCH == "master"'
      when: manual
    - when: never
  environment:
    name: master

deploy:develop:
  extends: .base-deploy-swarm
  rules:
    - if: '$SECURITY_SCHEDULE == "true"'
      when: never
    - if: '$CI_COMMIT_BRANCH == "develop"'
      when: on_success
    - when: never
  environment:
    name: dev

deploy:prod:
  extends: .base-deploy-swarm
  rules:
    - if: '$SECURITY_SCHEDULE == "true"'
      when: never
    - if: '$CI_COMMIT_BRANCH == "master"'
      when: manual
    - when: never
  environment:
    name: master

rollback:backend:
  <<: *rollback-swarm-template
  variables:
    SERVICES: "backend"
    WAIT_SECONDS: "2"
  needs:
    - job: "deploy:prod"

rollback:nginx:
  <<: *rollback-swarm-template
  variables:
     SERVICES: "nginx"
     WAIT_SECONDS: "2"
  needs:
    - job: "deploy:prod"